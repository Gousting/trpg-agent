<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRPG Roguelike 跑团</title>
<style>
  :root {
    --bg: #0d0d0d; --panel: #1a1a1a; --border: #2a2a2a;
    --text: #c8c0b8; --accent: #8b4513; --kp-color: #b8a080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Georgia', 'Noto Serif SC', serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  #controls {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #controls button {
    background: var(--accent); color: #fff; border: none;
    padding: 8px 18px; font-size: 13px; cursor: pointer; border-radius: 3px; font-family: inherit;
  }
  #controls button:disabled { opacity: 0.4; }
  #controls label { font-size: 11px; color: #888; }
  #controls input, #controls select {
    background: #222; border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; font-size: 12px; border-radius: 3px; font-family: inherit;
  }
  #status { font-size: 12px; color: #888; margin-left: auto; }
  #main { display: flex; flex: 1; overflow: hidden; }
  /* ── 左侧面板 ── */
  #sidebar {
    width: 280px; background: var(--panel); border-right: 1px solid var(--border);
    padding: 12px; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px;
  }
  .char-card {
    background: #141414; border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; transition: border-color 0.3s;
  }
  .char-card.active { border-color: var(--accent); }
  .char-name { font-size: 14px; font-weight: bold; margin-bottom: 6px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
  .stat-label { color: #888; }
  .stat-bar-bg { height: 5px; background: #222; border-radius: 3px; margin-bottom: 4px; overflow: hidden; }
  .stat-bar-fg { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.5s; }
  .hp-bar { background: #c0392b; }
  .san-bar { background: #2980b9; }
  .inv-list { font-size: 10px; color: #888; margin-top: 4px; line-height: 1.4; }
  .item-new { color: #f0c040; animation: flashItem 1s ease; }
  @keyframes flashItem { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  .conditions { font-size: 10px; color: #c0392b; }
  /* ── 小地图 ── */
  #minimap-box {
    background: #0a0a0a; border: 1px solid #222; border-radius: 4px;
    padding: 0; flex-shrink: 0; position: relative; overflow: hidden;
  }
  #minimap-box h3 {
    font-size: 11px; color: #665; margin: 0; padding: 6px 8px;
    text-align: center; background: #111; border-bottom: 1px solid #1a1a1a;
  }
  #minimap {
    width: 100%; height: 240px; display: block;
    image-rendering: pixelated;
  }
  /* ── 中央 ── */
  #chat {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 88%; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg-header { font-size: 10px; font-weight: bold; margin-bottom: 3px; opacity: 0.7; }
  .msg-body { font-size: 13px; line-height: 1.7; padding: 10px 14px; border-radius: 6px; }
  .msg-kp .msg-body { background: #1a1a1a; border: 1px solid #2a2a2a; border-left: 3px solid var(--kp-color); }
  .msg-player .msg-body { background: #141414; border: 1px solid #252525; border-left: 3px solid var(--player-color, #555); }
  .msg-dice {
    align-self: center; background: #1a1008; border: 1px solid #3a2810;
    border-radius: 6px; padding: 8px 14px; font-size: 12px; color: #d4a040;
    text-align: center; animation: fadeIn 0.5s ease;
  }
  .msg-item {
    align-self: center; background: #0a1a0a; border: 1px solid #1a3a1a;
    border-radius: 6px; padding: 6px 14px; font-size: 12px; color: #50c878;
    text-align: center; animation: fadeIn 0.5s ease;
  }
  .msg-damage {
    align-self: center; background: #1a0808; border: 1px solid #3a1818;
    border-radius: 6px; padding: 6px 14px; font-size: 12px; color: #e05050;
    text-align: center; animation: fadeIn 0.3s ease;
  }
  #progress { height: 3px; background: #222; flex-shrink: 0; }
  #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  /* ── 房间信息条 ── */
  #room-info {
    background: #111; border-bottom: 1px solid #222; padding: 6px 16px;
    font-size: 11px; color: #888; flex-shrink: 0; display: flex; gap: 20px;
  }
  #room-info span { color: var(--kp-color); }
</style>
</head>
<body>

<div id="controls">
  <button id="btn-start" onclick="startGame()">▶ 开始跑团</button>
  <label>KP</label><select id="kp-model"><option>gemma4:12b</option></select>
  <label>玩家</label><select id="player-model"><option>ornith:9b</option></select>
  <label>轮数</label><input id="turns" type="number" value="12" min="3" max="30" style="width:45px">
  <label>种子</label><input id="seed" type="text" placeholder="随机" style="width:55px">
  <span id="status">就绪</span>
</div>

<div id="room-info">
  📍 <span id="room-name">—</span>
  🎒 房间物品: <span id="room-items">—</span>
</div>

<div id="main">
  <div id="sidebar">
    <div id="minimap-box">
      <h3>🗺️ 松林疗养院</h3>
      <canvas id="minimap" width="520" height="400"></canvas>
    </div>
    <div class="char-card" id="card-陈明">
      <div class="char-name" style="color:#4a90d9">🕵️ 陈明</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-陈明">12/12</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-陈明" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-陈明">60/60</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-陈明" style="width:100%"></div></div>
      <div class="inv-list" id="inv-陈明">🎒 手电筒·警徽·.38左轮</div>
      <div class="conditions" id="cond-陈明"></div>
    </div>
    <div class="char-card" id="card-林晓">
      <div class="char-name" style="color:#50c878">🔬 林晓</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-林晓">10/10</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-林晓" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-林晓">70/70</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-林晓" style="width:100%"></div></div>
      <div class="inv-list" id="inv-林晓">🎒 急救包·笔记本·相机</div>
      <div class="conditions" id="cond-林晓"></div>
    </div>
    <div class="char-card" id="card-王刚">
      <div class="char-name" style="color:#e07050">💪 王刚</div>
      <div class="stat-row"><span class="stat-label">HP</span><span id="hp-王刚">15/15</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg hp-bar" id="hpbar-王刚" style="width:100%"></div></div>
      <div class="stat-row"><span class="stat-label">SAN</span><span id="san-王刚">40/40</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fg san-bar" id="sanbar-王刚" style="width:100%"></div></div>
      <div class="inv-list" id="inv-王刚">🎒 棒球棍·打火机·香烟</div>
      <div class="conditions" id="cond-王刚"></div>
    </div>
  </div>
  <div id="chat">
    <div style="text-align:center;color:#555;margin-top:100px;font-size:14px;">
      点击「开始跑团」<br>
      <span style="font-size:12px;color:#444;">程序化地图 · 物品收集 · Roguelike</span>
    </div>
  </div>
</div>

<div id="progress"><div id="progress-bar"></div></div>

<script>
let es = null, totalTurns = 12, currentTurn = 0, gmap = null;

function startGame() {
  const btn = document.getElementById('btn-start');
  btn.disabled = true; btn.textContent = '⏳ 运行中...'; btn.classList.add('running');
  document.getElementById('status').textContent = '生成地图...';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('progress-bar').style.width = '0%';
  currentTurn = 0;
  totalTurns = parseInt(document.getElementById('turns').value) || 12;

  const params = new URLSearchParams({
    host: 'http://192.168.0.108:11434',
    kp: document.getElementById('kp-model').value,
    player: document.getElementById('player-model').value,
    turns: totalTurns,
    seed: document.getElementById('seed').value || '',
  });

  es = new EventSource('/api/stream?' + params);

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    switch (d.type) {
      case 'status': document.getElementById('status').textContent = d.text; break;
      case 'map':
        gmap = d.map;
        drawMap();
        document.getElementById('status').textContent = '地图生成完成';
        break;
      case 'init':
        document.getElementById('status').textContent = '游戏开始';
        updateRoomInfo(d.room);
        break;
      case 'player_action':
        addMsg('player', d.speaker, d.text, d.color);
        highlightCard(d.speaker);
        break;
      case 'dice_roll':
        addMsg('dice', '', '🎲 ' + d.speaker + ' · ' + d.text);
        break;
      case 'item_pickup':
        addMsg('item', '', '📦 ' + d.speaker + ' 获得: ' + d.items.join(', '));
        break;
      case 'damage':
        addMsg('damage', '', '💥 ' + d.speaker + ' 受到 ' + d.amount + ' 点伤害 (' + d.source + ')');
        break;
      case 'kp_narration':
        addMsg('kp', 'KP', d.text);
        currentTurn++;
        document.getElementById('progress-bar').style.width = (currentTurn/totalTurns*100)+'%';
        if (d.state) updateState(d.state);
        break;
      case 'room_change':
        gmap = d.map;
        gmap.current_room_id = d.room_id;
        drawMap();
        updateRoomInfo({name: d.room_name, desc: d.room_desc, items: d.items});
        addMsg('kp', '📍', '进入 ' + d.room_name + ' — ' + d.room_desc);
        break;
      case 'done':
        addMsg('kp', '📋 终局', d.summary.replace(/\n/g, '<br>'));
        document.getElementById('status').textContent = '完成 ✓';
        resetBtn();
        break;
    }
  };
  es.onerror = () => { document.getElementById('status').textContent = '连接断开'; resetBtn(); };
}

function resetBtn() {
  const btn = document.getElementById('btn-start');
  btn.disabled = false; btn.textContent = '▶ 重新开始'; btn.classList.remove('running');
  if (es) es.close();
}

function addMsg(type, speaker, text, color) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  if (color) div.style.setProperty('--player-color', color);
  const hdr = speaker ? `<div class="msg-header">${speaker}</div>` : '';
  div.innerHTML = hdr + `<div class="msg-body">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function highlightCard(name) {
  document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + name);
  if (card) card.classList.add('active');
}

function updateState(state) {
  for (const [name, s] of Object.entries(state)) {
    const hpEl = document.getElementById('hp-' + name);
    const sanEl = document.getElementById('san-' + name);
    const hpBar = document.getElementById('hpbar-' + name);
    const sanBar = document.getElementById('sanbar-' + name);
    if (hpEl) hpEl.textContent = s.hp + '/' + s.max_hp;
    if (sanEl) sanEl.textContent = s.san + '/' + s.max_san;
    if (hpBar) {
      const pct = s.hp / s.max_hp * 100;
      hpBar.style.width = pct + '%';
      hpBar.style.background = pct > 50 ? '#c0392b' : pct > 25 ? '#e67e22' : '#e74c3c';
    }
    if (sanBar) sanBar.style.width = (s.san / s.max_san * 100) + '%';
    // 物品
    const invEl = document.getElementById('inv-' + name);
    if (invEl && s.inventory && s.inventory.length > 0) {
      invEl.innerHTML = '🎒 ' + s.inventory.join(' · ');
    }
    // 状态
    const condEl = document.getElementById('cond-' + name);
    if (condEl && s.conditions && s.conditions.length > 0) {
      condEl.textContent = '⚠ ' + s.conditions.join(', ');
    }
  }
}

function updateRoomInfo(room) {
  document.getElementById('room-name').textContent = room.name || '—';
  document.getElementById('room-items').textContent = (room.items && room.items.length > 0)
    ? room.items.join(', ') : '—';
}

// ═══════════════════════════════════════════════════════
// Canvas 暗黑地牢地图
// ═══════════════════════════════════════════════════════

const ROOM_COLORS = {
  entrance: '#4a3828', corridor: '#1a1815', ward: '#1a2a18',
  lab: '#181a28', morgue: '#151515', office: '#2a2418',
  basement: '#2a1010', supply: '#2a2818',
};

const ROOM_GLOW = {
  entrance: '#6a5840', corridor: '#2a2820', ward: '#2a4a28',
  lab: '#282a48', morgue: '#252525', office: '#4a4428',
  basement: '#4a2020', supply: '#4a4828',
};

const ROOM_ICONS = {
  entrance: '🚪', corridor: '', ward: '🛏️', lab: '🔬',
  morgue: '⚰️', office: '📁', basement: '💀', supply: '📦',
};

let fogAlpha = {}; // 迷雾透明度动画

function drawMap() {
  if (!gmap) return;
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 找到边界
  let minX = 99, minY = 99, maxX = 0, maxY = 0;
  for (const r of Object.values(gmap.rooms)) {
    minX = Math.min(minX, r.grid_x); maxX = Math.max(maxX, r.grid_x + r.grid_w);
    minY = Math.min(minY, r.grid_y); maxY = Math.max(maxY, r.grid_y + r.grid_h);
  }
  const pad = 3;
  minX -= pad; maxX += pad; minY -= pad; maxY += pad;
  const mapW = maxX - minX, mapH = maxY - minY;
  const scale = Math.min(W / mapW, H / mapH);
  const ox = (W - mapW * scale) / 2, oy = (H - mapH * scale) / 2;

  const tx = (gx) => ox + (gx - minX) * scale;
  const ty = (gy) => oy + (gy - minY) * scale;
  const ts = (s) => s * scale;

  // 背景
  ctx.fillStyle = '#060606';
  ctx.fillRect(0, 0, W, H);

  // 走廊
  const drawnCorridors = new Set();
  for (const [rid, room] of Object.entries(gmap.rooms)) {
    for (const cid of room.connections) {
      const key = [rid, cid].sort().join('-');
      if (drawnCorridors.has(key)) continue;
      drawnCorridors.add(key);

      const other = gmap.rooms[cid];
      if (!other || !room.visited || !other.visited) continue;
      const cx1 = room.grid_x + room.grid_w / 2, cy1 = room.grid_y + room.grid_h / 2;
      const cx2 = other.grid_x + other.grid_w / 2, cy2 = other.grid_y + other.grid_h / 2;
      ctx.strokeStyle = '#1a1815';
      ctx.lineWidth = ts(0.8);
      ctx.beginPath();
      ctx.moveTo(tx(cx1), ty(cy1));
      ctx.lineTo(tx(cx2), ty(cy2));
      ctx.stroke();
    }
  }

  // 房间
  for (const [rid, room] of Object.entries(gmap.rooms)) {
    const rx = tx(room.grid_x), ry = ty(room.grid_y);
    const rw = ts(room.grid_w), rh = ts(room.grid_h);

    if (!room.visited) {
      // 未探索：暗色方块
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(rx + 1, ry + 1, rw - 2, rh - 2);
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx, ry, rw, rh);
      continue;
    }

    const isCurrent = room.id === gmap.current_room_id;
    const isBoss = room.id === gmap.boss_room_id;
    const color = ROOM_COLORS[room.type] || '#222';
    const glow = ROOM_GLOW[room.type] || '#333';

    // 房间主体
    ctx.fillStyle = color;
    ctx.fillRect(rx, ry, rw, rh);

    // 发光效果（当前房间）
    if (isCurrent) {
      const grad = ctx.createRadialGradient(rx + rw/2, ry + rh/2, 0, rx + rw/2, ry + rh/2, Math.max(rw, rh) * 1.5);
      grad.addColorStop(0, 'rgba(255,200,100,0.15)');
      grad.addColorStop(0.5, 'rgba(255,150,50,0.05)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(rx - rw, ry - rh, rw * 3, rh * 3);
    }

    // Boss 房红光脉冲
    if (isBoss && room.visited) {
      const pulse = 0.3 + 0.2 * Math.sin(Date.now() / 1000);
      const bgrad = ctx.createRadialGradient(rx + rw/2, ry + rh/2, 0, rx + rw/2, ry + rh/2, Math.max(rw, rh) * 1.2);
      bgrad.addColorStop(0, `rgba(200,30,30,${pulse})`);
      bgrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = bgrad;
      ctx.fillRect(rx - rw, ry - rh, rw * 3, rh * 3);
    }

    // 边框
    ctx.strokeStyle = isCurrent ? '#d4a040' : isBoss ? '#802020' : '#333';
    ctx.lineWidth = isCurrent ? 2 : 1;
    ctx.strokeRect(rx, ry, rw, rh);

    // 图标和名称
    const icon = ROOM_ICONS[room.type] || '';
    const fontSize = Math.max(9, ts(1.6));
    ctx.fillStyle = '#aaa';
    ctx.font = `${fontSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const label = room.name.replace(/\(.*\)/, '');
    if (rw > ts(4) && rh > ts(3)) {
      ctx.fillText(icon, rx + rw/2, ry + rh/2 - fontSize * 0.5);
      ctx.fillText(label, rx + rw/2, ry + rh/2 + fontSize * 0.8);
    } else if (rw > ts(3)) {
      ctx.fillText(label, rx + rw/2, ry + rh/2);
    }
  }

  // 当前房间高亮环
  const cur = gmap.rooms[gmap.current_room_id];
  if (cur && cur.visited) {
    const crx = tx(cur.grid_x), cry = ty(cur.grid_y);
    const crw = ts(cur.grid_w), crh = ts(cur.grid_h);
    ctx.strokeStyle = 'rgba(255,200,80,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 2]);
    ctx.strokeRect(crx - 2, cry - 2, crw + 4, crh + 4);
    ctx.setLineDash([]);
  }
}

// Boss 房脉冲动画循环
let mapAnimId = null;
function startMapAnimation() {
  if (mapAnimId) return;
  function anim() {
    if (gmap) drawMap();
    mapAnimId = requestAnimationFrame(anim);
  }
  anim();
}
startMapAnimation();
</script>
</body>
</html>
